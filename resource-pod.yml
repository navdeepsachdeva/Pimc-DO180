apiVersion: v1
kind: Pod
metadata:
  name: resource-pod
  labels:
    mypod: simple
spec:
  restartPolicy: OnFailure
  containers:
    - name: web
      image: registry.access.redhat.com/ubi9/httpd-24:9.7
      resources:
        requests:
          cpu: 20m
          memory: 40Mi
        limits:
          cpu: 20m
          memory: 40Mi

      ports:
        - containerPort: 8080
          protocol: TCP
        - containerPort: 8443
